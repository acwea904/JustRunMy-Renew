name: JustRunMy 自动续期
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */2 * *'
jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write
    steps:
      - name: 📥 拉取私库代码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/JustRunMy-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🛡️ 启动 GOST 代理转发 (动态判断)
        env:
          PROXY_SECRET: ${{ secrets.GOST_PROXY }}
        run: |
          if [ -z "$PROXY_SECRET" ]; then
            echo "ℹ️ 未配置 GOST_PROXY Secrets，将使用直连模式。"
            echo "PROXY_FLAG=false" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "ℹ️ 检测到 GOST_PROXY Secrets，准备启动代理..."
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          
          nohup ./gost -L http://:8080 -F "$PROXY_SECRET" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org \
            | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1**/g'
          echo ""
            
          echo "PROXY_FLAG=true" >> $GITHUB_ENV

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            fonts-noto-cjk

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver

      - name: 🚀 执行续期
        env:
          JUSTRUNMY_EMAIL: ${{ secrets.JUSTRUNMY_EMAIL }}
          JUSTRUNMY_PASSWORD: ${{ secrets.JUSTRUNMY_PASSWORD }}
          GOST_PROXY:        ${{ env.PROXY_FLAG }}
          TG_CHAT_ID:        ${{ secrets.TG_CHAT_ID }}
          TG_BOT_TOKEN:      ${{ secrets.TG_BOT_TOKEN }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python justrunmy_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3

      - name: 🧹 清理旧的运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "正在查询旧的运行记录..."
          run_ids=$(gh run list --workflow "${{ github.workflow }}" --limit 50 --json databaseId --jq '.[].databaseId' | \
                    grep -v "${{ github.run_id }}" | \
                    tail -n +3)

          for id in $run_ids; do
            echo "正在删除运行记录 ID: $id"
            gh run delete "$id" || true
          done
          echo "✅ 清理完成，仅保留最近运行记录。"
